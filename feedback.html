<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple-soft: #7B6FE8;
    --pink: #E87FD4;
    --pink-bright: #F09AE0;
    --bg: #0E0C1A;
    --bg-card: #16132A;
    --text: #F0EEF8;
    --text-muted: #A09AC0;
    --text-faint: #605A80;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(232,127,212,0.5);
    --success: #1D9E75;
    --danger: #E24B4A;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 2.5rem; background: rgba(14,12,26,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.01em; }
  .logo-mark { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #5B4FD4, #4A6ED4); display: flex; align-items: center; justify-content: center; }
  .nav-links { display: flex; align-items: center; gap: 1.5rem; }
  .nav-link { font-size: 13px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--text); }
  .nav-download { font-size: 13px; font-weight: 500; color: var(--bg); background: var(--pink); padding: 0.45rem 1.1rem; border-radius: 6px; text-decoration: none; }
  .nav-download:hover { background: var(--pink-bright); }
  main { max-width: 560px; margin: 0 auto; padding: 8rem 2rem 5rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--pink); opacity: 0.8; margin-bottom: 0.6rem; }
  h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); font-weight: 600; line-height: 1.2; letter-spacing: -0.025em; color: var(--text); margin-bottom: 0.75rem; }
  h1 span { background: linear-gradient(90deg, var(--pink), var(--purple-soft)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .intro { font-size: 14px; color: var(--text-muted); font-weight: 300; line-height: 1.8; margin-bottom: 2rem; }
  .debug-tip { background: #16132A; border: 1px solid rgba(232,127,212,0.2); border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 2.25rem; display: flex; gap: 0.75rem; align-items: flex-start; }
  .debug-icon { width: 28px; height: 28px; border-radius: 7px; background: rgba(232,127,212,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .debug-tip p { font-size: 13px; color: var(--text-muted); line-height: 1.65; font-weight: 300; }
  .debug-tip strong { color: var(--text); font-weight: 500; }
  .form-group { margin-bottom: 1.25rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; letter-spacing: 0.02em; }
  input, textarea { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; font-family: inherit; font-size: 14px; font-weight: 300; color: var(--text); outline: none; transition: border-color 0.2s; resize: vertical; }
  input::placeholder, textarea::placeholder { color: var(--text-faint); }
  input:focus, textarea:focus { border-color: var(--border-focus); }
  textarea { min-height: 120px; line-height: 1.6; }
  .captcha-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
  .captcha-question { font-size: 13px; color: var(--text-muted); font-weight: 400; white-space: nowrap; }
  .captcha-question span { color: var(--text); font-weight: 500; }
  .captcha-input { width: 80px; flex-shrink: 0; }
  .btn-submit { width: 100%; padding: 0.8rem; background: var(--pink); color: #1A0E2E; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .btn-submit:hover { background: var(--pink-bright); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 13px; font-weight: 400; display: none; }
  .status.success { background: rgba(29,158,117,0.12); border: 1px solid rgba(29,158,117,0.3); color: #5DCAA5; display: block; }
  .status.error { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.25); color: #F09595; display: block; }
  footer { border-top: 1px solid var(--border); padding: 1.5rem 2.5rem; text-align: center; font-size: 12px; color: var(--text-faint); }
</style>
</head>

        <line x1="14.3" y1="3.7" x2="3.7" y2="14.3" stroke="#E87FD4" stroke-width="2.8" stroke-linecap="round"/>
      </svg>
